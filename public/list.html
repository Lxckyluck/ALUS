<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ALUS | Liste des mérites</title>
    <link rel="stylesheet" href="./stylesheets/forms.css" />
  </head>
  <body>
    <div class="snowflake"></div>
    <div class="snowflake"></div>
    <div class="snowflake"></div>
    <div class="snowflake"></div>
    <div class="snowflake"></div>
    <div class="snowflake"></div>
    <div class="snowflake"></div>
    <div class="snowflake"></div>
    <div class="snowflake"></div>

    <h1>Liste des mérites</h1>
    <form id="Form">
      <p>
        Pour accéder à la liste des mérites, merci de bien vouloir saisir la
        "clé"
        <br />
        <input type="text" id="key" required />
        <br />
        <button type="submit">Soumettre</button>
      </p>
    </form>
    <br />
    <p id="content"></p>
    <br />
    <a href="./home.html"><img src="./images/santa.png" alt="" id="santa" /></a>

    <script>
      document.getElementById("Form").addEventListener("submit", function (e) {
        e.preventDefault();

        const key = document.getElementById("key").value;
        const contentPara = document.getElementById("content");

        contentPara.innerHTML = "Chargement...";

        fetch("/list/content", {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
          },
          body: JSON.stringify({ userKey: key }),
        })
          .then((response) => response.json())
          .then((data) => {
            if (data && data.length > 0) {
              contentPara.innerHTML = data.join("<br />");
            } else {
              contentPara.innerHTML =
                "Aucune donnée trouvée ou clé incorrecte.";
            }
          })
          .catch((error) => {
            console.error("Erreur:", error);
            contentPara.innerHTML = "Erreur lors de la requête.";
          });
      });
    </script>
  </body>
</html>
