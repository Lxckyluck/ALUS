<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <title>Esquive le Père Noël !</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        background: #0a0a2e;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        height: 100vh;
        font-family: Arial, sans-serif;
        overflow: hidden;
      }
      h1 {
        color: #fff;
        margin-bottom: 6px;
        font-size: 22px;
        text-shadow: 0 0 10px #ff4444;
      }
      #scoreBoard {
        color: #fff;
        font-size: 16px;
        margin-bottom: 4px;
      }
      #diffBar {
        width: 700px;
        height: 12px;
        background: #333;
        border-radius: 8px;
        margin-bottom: 4px;
        overflow: hidden;
        border: 1px solid #555;
      }
      #diffFill {
        height: 100%;
        width: 0%;
        border-radius: 8px;
        background: linear-gradient(90deg, #00ff88, #ffff00, #ff4400, #ff0000);
        transition: width 0.3s;
      }
      #diffLabel {
        color: #aaa;
        font-size: 12px;
        margin-bottom: 4px;
      }

      /* FLAG DISPLAY */
      #flagContainer {
        width: 700px;
        background: rgba(0, 0, 0, 0.5);
        border: 2px solid #00ff88;
        border-radius: 8px;
        padding: 6px 12px;
        margin-bottom: 6px;
        display: flex;
        align-items: center;
        gap: 10px;
      }
      #flagLabel {
        color: #00ff88;
        font-size: 13px;
        white-space: nowrap;
      }
      #flagDisplay {
        font-family: "Courier New", monospace;
        font-size: 15px;
        letter-spacing: 3px;
        color: #fff;
        flex: 1;
        word-break: break-all;
      }
      #flagDisplay .revealed {
        color: #00ff88;
        text-shadow: 0 0 8px #00ff88;
      }
      #flagDisplay .hidden {
        color: #444;
      }
      #flagProgress {
        color: #aaa;
        font-size: 12px;
        white-space: nowrap;
      }

      #gameCanvas {
        border: 3px solid #ff4444;
        border-radius: 8px;
        background: #1a1a3e;
        box-shadow: 0 0 20px #ff4444;
        cursor: none;
      }
      #message {
        color: #fff;
        font-size: 18px;
        margin-top: 6px;
        min-height: 26px;
        text-align: center;
      }
      #restartBtn {
        display: none;
        margin-top: 8px;
        padding: 8px 28px;
        font-size: 16px;
        background: #ff4444;
        color: white;
        border: none;
        border-radius: 8px;
        cursor: pointer;
        transition: background 0.2s;
      }
      #restartBtn:hover {
        background: #cc0000;
      }

      /* NOTIFICATION CARACTÈRE */
      #charNotif {
        position: fixed;
        top: 20px;
        right: 20px;
        background: rgba(0, 255, 136, 0.15);
        border: 2px solid #00ff88;
        border-radius: 10px;
        padding: 10px 18px;
        color: #00ff88;
        font-size: 20px;
        font-family: "Courier New", monospace;
        opacity: 0;
        transition: opacity 0.3s;
        pointer-events: none;
        text-align: center;
      }

      /* FLAG COMPLET */
      #victoryOverlay {
        display: none;
        position: fixed;
        inset: 0;
        background: rgba(0, 0, 0, 0.85);
        z-index: 100;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 16px;
      }
      #victoryOverlay h2 {
        color: #00ff88;
        font-size: 36px;
        text-shadow: 0 0 20px #00ff88;
      }
      #victoryFlag {
        font-family: "Courier New", monospace;
        font-size: 22px;
        color: #00ff88;
        background: rgba(0, 255, 136, 0.1);
        border: 2px solid #00ff88;
        border-radius: 10px;
        padding: 16px 30px;
        text-shadow: 0 0 10px #00ff88;
        letter-spacing: 2px;
      }
      #victoryOverlay button {
        padding: 10px 30px;
        font-size: 18px;
        background: #00ff88;
        color: #000;
        border: none;
        border-radius: 8px;
        cursor: pointer;
        font-weight: bold;
      }
    </style>
  </head>
  <body>
    <h1>🎅 Esquive & Collecte le Flag !</h1>
    <div id="scoreBoard">
      ⏱️ Survie : <span id="score">0</span>s &nbsp;|&nbsp; 🏆 Meilleur :
      <span id="best">0</span>s
    </div>
    <div id="diffLabel">🔥 Intensité : <span id="diffText">Calme</span></div>
    <div id="diffBar"><div id="diffFill"></div></div>

    <div id="flagContainer">
      <span id="flagLabel">🚩 FLAG :</span>
      <span id="flagDisplay">Chargement...</span>
      <span id="flagProgress">0 / ?</span>
    </div>

    <canvas id="gameCanvas" width="700" height="420"></canvas>
    <div id="message">
      🖱️ Déplace ta souris pour esquiver et collecter les lettres !
    </div>
    <button id="restartBtn" onclick="restartGame()">🔄 Rejouer</button>

    <div id="charNotif"></div>

    <div id="victoryOverlay">
      <h2>🏆 FLAG CAPTURÉ !</h2>
      <div id="victoryFlag"></div>
      <button
        onclick="
          restartGame();
          document.getElementById('victoryOverlay').style.display = 'none';
        "
      >
        🔄 Rejouer
      </button>
    </div>

    <script src="env.js"></script>
    <script>
      const canvas = document.getElementById("gameCanvas");
      const ctx = canvas.getContext("2d");
      const scoreEl = document.getElementById("score");
      const bestEl = document.getElementById("best");
      const messageEl = document.getElementById("message");
      const restartBtn = document.getElementById("restartBtn");
      const diffFill = document.getElementById("diffFill");
      const diffText = document.getElementById("diffText");
      const flagDisplay = document.getElementById("flagDisplay");
      const flagProgress = document.getElementById("flagProgress");
      const charNotif = document.getElementById("charNotif");
      const victoryOverlay = document.getElementById("victoryOverlay");
      const victoryFlag = document.getElementById("victoryFlag");

      // =====================
      // FLAG
      // =====================
      let fullFlag = "";
      let revealedIndices = new Set();
      let flagLoaded = false;

      async function fetchFlag() {
        try {
          const res = await fetch(`${BASE_URL}/flags/this_is_the_last_flag`);
          const data = await res.json();
          fullFlag = data.flag;
          flagLoaded = true;
          renderFlagDisplay();
          console.log(`[FLAG] Chargé : ${fullFlag.length} caractères`);
        } catch (e) {
          flagDisplay.textContent = "⚠️ Impossible de charger le flag";
          console.error("[FLAG] Erreur fetch :", e);
        }
      }

      function renderFlagDisplay() {
        if (!flagLoaded) return;
        let html = "";
        for (let i = 0; i < fullFlag.length; i++) {
          if (revealedIndices.has(i)) {
            html += `<span class="revealed">${fullFlag[i]}</span>`;
          } else {
            html += `<span class="hidden">_</span>`;
          }
        }
        flagDisplay.innerHTML = html;
        flagProgress.textContent = `${revealedIndices.size} / ${fullFlag.length}`;

        if (revealedIndices.size === fullFlag.length) {
          triggerVictory();
        }
      }

      function revealNextChar() {
        if (!flagLoaded || revealedIndices.size >= fullFlag.length) return;

        // Trouver un index non révélé aléatoire
        const hidden = [];
        for (let i = 0; i < fullFlag.length; i++) {
          if (!revealedIndices.has(i)) hidden.push(i);
        }
        if (hidden.length === 0) return;

        const idx = hidden[Math.floor(Math.random() * hidden.length)];
        revealedIndices.add(idx);
        renderFlagDisplay();

        // Notification
        showCharNotif(fullFlag[idx], idx);
      }

      function showCharNotif(char, index) {
        charNotif.innerHTML = `✨ Lettre récupérée !<br><strong style="font-size:28px">${char === " " ? "␣" : char}</strong><br><span style="font-size:12px;color:#aaa">Position ${index + 1}</span>`;
        charNotif.style.opacity = "1";
        clearTimeout(charNotif._timeout);
        charNotif._timeout = setTimeout(() => {
          charNotif.style.opacity = "0";
        }, 2000);
      }

      function triggerVictory() {
        gameOver = true;
        cancelAnimationFrame(animId);
        clearTimeout(spawnTimeout);
        clearTimeout(bubbleTimeout);
        victoryFlag.textContent = fullFlag;
        victoryOverlay.style.display = "flex";
      }

      // =====================
      // BULLES DE FLAG (à collecter)
      // =====================
      let flagBubbles = [];
      let bubbleTimeout;
      const BUBBLE_SPAWN_INTERVAL = 6000; // toutes les 6s

      function scheduleBubble() {
        if (gameOver) return;
        bubbleTimeout = setTimeout(() => {
          spawnFlagBubble();
          scheduleBubble();
        }, BUBBLE_SPAWN_INTERVAL);
      }

      function spawnFlagBubble() {
        if (gameOver || !flagLoaded || revealedIndices.size >= fullFlag.length)
          return;

        // Position aléatoire dans le canvas (loin du père noël)
        const margin = 80;
        let x, y;
        do {
          x = margin + Math.random() * (canvas.width - margin * 2);
          y = margin + Math.random() * (canvas.height - margin * 2);
        } while (x < 200 && y < 200); // éviter zone père noël

        flagBubbles.push({
          x,
          y,
          radius: 22,
          life: 1.0, // opacité / durée de vie
          decay: 0.0015, // disparaît lentement
          pulse: Math.random() * Math.PI * 2,
          collected: false,
        });
      }

      function drawFlagBubbles() {
        flagBubbles.forEach((b) => {
          if (b.collected) return;
          b.pulse += 0.06;
          const pulseFactor = 1 + Math.sin(b.pulse) * 0.12;
          const r = b.radius * pulseFactor;

          ctx.globalAlpha = b.life;

          // Halo externe
          const halo = ctx.createRadialGradient(b.x, b.y, 0, b.x, b.y, r * 2.2);
          halo.addColorStop(0, "rgba(0,255,136,0.3)");
          halo.addColorStop(1, "rgba(0,255,136,0)");
          ctx.fillStyle = halo;
          ctx.beginPath();
          ctx.arc(b.x, b.y, r * 2.2, 0, Math.PI * 2);
          ctx.fill();

          // Bulle
          const grad = ctx.createRadialGradient(
            b.x - r * 0.3,
            b.y - r * 0.3,
            r * 0.1,
            b.x,
            b.y,
            r,
          );
          grad.addColorStop(0, "rgba(180,255,220,0.95)");
          grad.addColorStop(0.5, "rgba(0,200,100,0.7)");
          grad.addColorStop(1, "rgba(0,100,50,0.4)");
          ctx.fillStyle = grad;
          ctx.beginPath();
          ctx.arc(b.x, b.y, r, 0, Math.PI * 2);
          ctx.fill();

          // Contour
          ctx.strokeStyle = "#00ff88";
          ctx.lineWidth = 2;
          ctx.stroke();

          // Icône
          ctx.globalAlpha = b.life;
          ctx.font = `${r * 1.1}px serif`;
          ctx.textAlign = "center";
          ctx.textBaseline = "middle";
          ctx.fillText("🔑", b.x, b.y);

          ctx.globalAlpha = 1;
        });
      }

      function checkBubbleCollection() {
        flagBubbles = flagBubbles.filter((b) => {
          if (b.collected) return false;

          // Décroissance
          b.life -= b.decay;
          if (b.life <= 0) return false;

          // Collision avec joueur
          const dx = b.x - player.x;
          const dy = b.y - player.y;
          const dist = Math.sqrt(dx * dx + dy * dy);
          if (dist < b.radius + player.radius) {
            b.collected = true;
            revealNextChar();
            spawnCollectParticles(b.x, b.y);
            return false;
          }
          return true;
        });
      }

      // =====================
      // DIFFICULTÉ
      // =====================
      const DIFFICULTY_LEVELS = [
        {
          time: 0,
          speed: 2.5,
          interval: 1400,
          label: "😴 Calme",
          color: "#00ff88",
        },
        {
          time: 5,
          speed: 3.5,
          interval: 1100,
          label: "😐 Attentif",
          color: "#88ff00",
        },
        {
          time: 10,
          speed: 4.5,
          interval: 900,
          label: "😬 Chaud...",
          color: "#ffff00",
        },
        {
          time: 18,
          speed: 5.5,
          interval: 700,
          label: "😰 Dangereux !",
          color: "#ffaa00",
        },
        {
          time: 28,
          speed: 7.0,
          interval: 500,
          label: "🔥 Enfer !",
          color: "#ff5500",
        },
        {
          time: 40,
          speed: 9.0,
          interval: 350,
          label: "💀 CHAOS",
          color: "#ff0000",
        },
        {
          time: 55,
          speed: 12,
          interval: 200,
          label: "☠️ IMPOSSIBLE",
          color: "#ff00ff",
        },
      ];

      let currentLevel = 0;
      let fireballSpeed = DIFFICULTY_LEVELS[0].speed;
      let spawnDelay = DIFFICULTY_LEVELS[0].interval;

      function updateDifficulty(elapsed) {
        let level = DIFFICULTY_LEVELS[0];
        let nextLevelIndex = 1;
        for (let i = DIFFICULTY_LEVELS.length - 1; i >= 0; i--) {
          if (elapsed >= DIFFICULTY_LEVELS[i].time) {
            level = DIFFICULTY_LEVELS[i];
            nextLevelIndex = Math.min(i + 1, DIFFICULTY_LEVELS.length - 1);
            break;
          }
        }
        const nextLevel = DIFFICULTY_LEVELS[nextLevelIndex];
        const t =
          nextLevel === level
            ? 1
            : Math.min(
                (elapsed - level.time) / (nextLevel.time - level.time),
                1,
              );
        fireballSpeed = level.speed + (nextLevel.speed - level.speed) * t;

        const maxTime = DIFFICULTY_LEVELS[DIFFICULTY_LEVELS.length - 1].time;
        diffFill.style.width = Math.min((elapsed / maxTime) * 100, 100) + "%";
        diffText.textContent = level.label;
        diffText.style.color = level.color;

        if (level !== DIFFICULTY_LEVELS[currentLevel]) {
          currentLevel = DIFFICULTY_LEVELS.indexOf(level);
          spawnDelay = level.interval;
        }
      }

      // =====================
      // ÉTAT DU JEU
      // =====================
      let player = { x: 350, y: 300, radius: 18 };
      let fireballs = [];
      let particles = [];
      let collectParticles = [];
      let gameOver = false;
      let startTime = Date.now();
      let bestScore = 0;
      let animId;
      let spawnTimeout;

      const santa = { x: 60, y: 70 };

      canvas.addEventListener("mousemove", (e) => {
        const rect = canvas.getBoundingClientRect();
        player.x = Math.max(
          player.radius,
          Math.min(canvas.width - player.radius, e.clientX - rect.left),
        );
        player.y = Math.max(
          player.radius,
          Math.min(canvas.height - player.radius, e.clientY - rect.top),
        );
      });

      // =====================
      // SPAWN BOULES DE FEU
      // =====================
      function scheduleNextFireball() {
        if (gameOver) return;
        spawnFireball();
        spawnTimeout = setTimeout(scheduleNextFireball, spawnDelay);
      }

      function spawnFireball() {
        if (gameOver) return;
        const startX = santa.x + 90;
        const startY = santa.y + 28;
        const angle = Math.atan2(player.y - startY, player.x - startX);
        const spread = (Math.random() - 0.5) * 0.35;
        const speedVar = 0.85 + Math.random() * 0.3;
        fireballs.push({
          x: startX,
          y: startY,
          vx: Math.cos(angle + spread) * fireballSpeed * speedVar,
          vy: Math.sin(angle + spread) * fireballSpeed * speedVar,
          radius: 12,
          wobble: Math.random() * Math.PI * 2,
          wobbleSpeed: (Math.random() - 0.5) * 0.15,
        });
      }

      // =====================
      // DESSIN PÈRE NOËL
      // =====================
      function drawSanta() {
        const x = santa.x;
        const y = santa.y;
        const shake = fireballSpeed > 7 ? (Math.random() - 0.5) * 3 : 0;
        ctx.save();
        ctx.translate(shake, shake * 0.5);

        ctx.fillStyle = "#cc0000";
        ctx.beginPath();
        ctx.ellipse(x, y + 60, 38, 50, 0, 0, Math.PI * 2);
        ctx.fill();

        ctx.fillStyle = "#333";
        ctx.fillRect(x - 38, y + 70, 76, 14);
        ctx.fillStyle = "#FFD700";
        ctx.fillRect(x - 10, y + 72, 20, 10);

        ctx.fillStyle = "#FDBCB4";
        ctx.beginPath();
        ctx.arc(x, y + 5, 28, 0, Math.PI * 2);
        ctx.fill();

        ctx.fillStyle = "#cc0000";
        ctx.beginPath();
        ctx.moveTo(x - 28, y - 10);
        ctx.lineTo(x + 28, y - 10);
        ctx.lineTo(x + 10, y - 50);
        ctx.lineTo(x - 5, y - 60);
        ctx.closePath();
        ctx.fill();

        ctx.fillStyle = "white";
        ctx.beginPath();
        ctx.arc(x + 0, y - 60, 8, 0, Math.PI * 2);
        ctx.fill();

        ctx.fillStyle = "white";
        ctx.beginPath();
        ctx.ellipse(x, y + 22, 22, 16, 0, 0, Math.PI);
        ctx.fill();

        const eyeColor = fireballSpeed > 7 ? "#ff0000" : "#333";
        ctx.fillStyle = eyeColor;
        ctx.beginPath();
        ctx.arc(x - 10, y, 4, 0, Math.PI * 2);
        ctx.fill();
        ctx.beginPath();
        ctx.arc(x + 10, y, 4, 0, Math.PI * 2);
        ctx.fill();

        if (fireballSpeed > 7) {
          ctx.fillStyle = "rgba(255,0,0,0.3)";
          ctx.beginPath();
          ctx.arc(x - 10, y, 9, 0, Math.PI * 2);
          ctx.fill();
          ctx.beginPath();
          ctx.arc(x + 10, y, 9, 0, Math.PI * 2);
          ctx.fill();
        }

        ctx.fillStyle = "rgba(255,150,150,0.5)";
        ctx.beginPath();
        ctx.arc(x - 18, y + 8, 7, 0, Math.PI * 2);
        ctx.fill();
        ctx.beginPath();
        ctx.arc(x + 18, y + 8, 7, 0, Math.PI * 2);
        ctx.fill();

        ctx.fillStyle = "#333";
        ctx.beginPath();
        ctx.arc(x, y + 15, 5, 0, Math.PI);
        ctx.fill();

        const armShake = fireballSpeed > 5 ? Math.sin(Date.now() / 80) * 3 : 0;
        ctx.strokeStyle = "#cc0000";
        ctx.lineWidth = 10;
        ctx.lineCap = "round";
        ctx.beginPath();
        ctx.moveTo(x + 35, y + 50);
        ctx.lineTo(x + 80, y + 30 + armShake);
        ctx.stroke();

        ctx.fillStyle = "#FDBCB4";
        ctx.beginPath();
        ctx.arc(x + 82, y + 28 + armShake, 10, 0, Math.PI * 2);
        ctx.fill();

        if (fireballSpeed > 5) {
          const flameGrad = ctx.createRadialGradient(
            x + 95,
            y + 28 + armShake,
            0,
            x + 95,
            y + 28 + armShake,
            15,
          );
          flameGrad.addColorStop(0, "rgba(255,255,100,0.9)");
          flameGrad.addColorStop(0.5, "rgba(255,80,0,0.6)");
          flameGrad.addColorStop(1, "rgba(255,0,0,0)");
          ctx.fillStyle = flameGrad;
          ctx.beginPath();
          ctx.arc(x + 95, y + 28 + armShake, 15, 0, Math.PI * 2);
          ctx.fill();
        }
        ctx.restore();
      }

      // =====================
      // DESSIN BOULE DE FEU
      // =====================
      function drawFireball(fb) {
        fb.wobble += fb.wobbleSpeed;
        const wx = Math.cos(fb.wobble) * 1.5;
        const wy = Math.sin(fb.wobble) * 1.5;
        const angle = Math.atan2(fb.vy, fb.vx);
        const trailLen = Math.sqrt(fb.vx * fb.vx + fb.vy * fb.vy) * 2;

        const trailGrad = ctx.createLinearGradient(
          fb.x + wx,
          fb.y + wy,
          fb.x - Math.cos(angle) * trailLen + wx,
          fb.y - Math.sin(angle) * trailLen + wy,
        );
        trailGrad.addColorStop(0, "rgba(255,150,0,0.6)");
        trailGrad.addColorStop(1, "rgba(255,0,0,0)");
        ctx.strokeStyle = trailGrad;
        ctx.lineWidth = fb.radius * 1.2;
        ctx.lineCap = "round";
        ctx.beginPath();
        ctx.moveTo(fb.x + wx, fb.y + wy);
        ctx.lineTo(
          fb.x - Math.cos(angle) * trailLen + wx,
          fb.y - Math.sin(angle) * trailLen + wy,
        );
        ctx.stroke();

        const grad = ctx.createRadialGradient(
          fb.x + wx,
          fb.y + wy,
          0,
          fb.x + wx,
          fb.y + wy,
          fb.radius * 2.2,
        );
        grad.addColorStop(0, "rgba(255,255,150,1)");
        grad.addColorStop(0.3, "rgba(255,120,0,0.8)");
        grad.addColorStop(1, "rgba(255,0,0,0)");
        ctx.fillStyle = grad;
        ctx.beginPath();
        ctx.arc(fb.x + wx, fb.y + wy, fb.radius * 2.2, 0, Math.PI * 2);
        ctx.fill();

        ctx.fillStyle = "#fff";
        ctx.beginPath();
        ctx.arc(fb.x + wx, fb.y + wy, fb.radius * 0.35, 0, Math.PI * 2);
        ctx.fill();
      }

      // =====================
      // DESSIN JOUEUR
      // =====================
      function drawPlayer() {
        ctx.fillStyle = "rgba(100,200,255,0.15)";
        ctx.beginPath();
        ctx.arc(player.x, player.y, player.radius + 8, 0, Math.PI * 2);
        ctx.fill();

        const grad = ctx.createRadialGradient(
          player.x - 5,
          player.y - 5,
          2,
          player.x,
          player.y,
          player.radius,
        );
        grad.addColorStop(0, "#aef");
        grad.addColorStop(1, "#0af");
        ctx.fillStyle = grad;
        ctx.beginPath();
        ctx.arc(player.x, player.y, player.radius, 0, Math.PI * 2);
        ctx.fill();
        ctx.strokeStyle = "#fff";
        ctx.lineWidth = 2;
        ctx.stroke();

        ctx.font = `${player.radius * 1.4}px serif`;
        ctx.textAlign = "center";
        ctx.textBaseline = "middle";
        ctx.fillText("🧑", player.x, player.y);
      }

      // =====================
      // PARTICULES
      // =====================
      function spawnParticles(x, y) {
        for (let i = 0; i < 30; i++) {
          const angle = Math.random() * Math.PI * 2;
          const speed = Math.random() * 6 + 1;
          particles.push({
            x,
            y,
            vx: Math.cos(angle) * speed,
            vy: Math.sin(angle) * speed,
            life: 1.0,
            color: `hsl(${Math.random() * 40 + 10}, 100%, 60%)`,
          });
        }
      }

      function spawnCollectParticles(x, y) {
        for (let i = 0; i < 20; i++) {
          const angle = Math.random() * Math.PI * 2;
          const speed = Math.random() * 5 + 1;
          collectParticles.push({
            x,
            y,
            vx: Math.cos(angle) * speed,
            vy: Math.sin(angle) * speed,
            life: 1.0,
          });
        }
      }

      function drawParticles() {
        particles.forEach((p) => {
          ctx.globalAlpha = p.life;
          ctx.fillStyle = p.color;
          ctx.beginPath();
          ctx.arc(p.x, p.y, 5 * p.life, 0, Math.PI * 2);
          ctx.fill();
        });
        collectParticles.forEach((p) => {
          ctx.globalAlpha = p.life;
          ctx.fillStyle = `hsl(${140 + p.life * 40}, 100%, 60%)`;
          ctx.beginPath();
          ctx.arc(p.x, p.y, 4 * p.life, 0, Math.PI * 2);
          ctx.fill();
        });
        ctx.globalAlpha = 1;
      }

      // =====================
      // FOND
      // =====================
      const stars = Array.from({ length: 70 }, () => ({
        x: Math.random() * 700,
        y: Math.random() * 420,
        r: Math.random() * 1.5 + 0.5,
        alpha: Math.random(),
      }));

      function drawBackground(elapsed) {
        const danger = Math.min(elapsed / 55, 1);
        const r = Math.floor(26 + danger * 60);
        const g = Math.floor(26 - danger * 20);
        const b = Math.floor(62 - danger * 40);
        ctx.fillStyle = `rgb(${r},${g},${b})`;
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        stars.forEach((s) => {
          ctx.globalAlpha =
            0.4 + 0.6 * Math.sin(Date.now() / 500 + s.alpha * 10);
          ctx.fillStyle = "#fff";
          ctx.beginPath();
          ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
          ctx.fill();
        });
        ctx.globalAlpha = 1;
      }

      // =====================
      // COLLISION
      // =====================
      function checkCollision(a, b) {
        const dx = a.x - b.x,
          dy = a.y - b.y;
        return Math.sqrt(dx * dx + dy * dy) < a.radius + b.radius - 5;
      }

      // =====================
      // BOUCLE PRINCIPALE
      // =====================
      function gameLoop() {
        if (gameOver) return;
        const elapsed = (Date.now() - startTime) / 1000;
        updateDifficulty(elapsed);

        drawBackground(elapsed);
        drawSanta();

        // Bulles de flag
        drawFlagBubbles();
        checkBubbleCollection();

        // Boules de feu
        fireballs = fireballs.filter((fb) => {
          fb.x += fb.vx;
          fb.y += fb.vy;
          drawFireball(fb);
          if (checkCollision(fb, player)) {
            spawnParticles(player.x, player.y);
            endGame(elapsed);
            return false;
          }
          return (
            fb.x > -80 &&
            fb.x < canvas.width + 80 &&
            fb.y > -80 &&
            fb.y < canvas.height + 80
          );
        });

        // Particules
        particles = particles.filter((p) => {
          p.x += p.vx;
          p.y += p.vy;
          p.vx *= 0.95;
          p.vy *= 0.95;
          p.life -= 0.025;
          return p.life > 0;
        });
        collectParticles = collectParticles.filter((p) => {
          p.x += p.vx;
          p.y += p.vy;
          p.vx *= 0.95;
          p.vy *= 0.95;
          p.life -= 0.03;
          return p.life > 0;
        });
        drawParticles();
        drawPlayer();

        scoreEl.textContent = Math.floor(elapsed);
        animId = requestAnimationFrame(gameLoop);
      }

      // =====================
      // FIN DE JEU
      // =====================
      function endGame(elapsed) {
        gameOver = true;
        cancelAnimationFrame(animId);
        clearTimeout(spawnTimeout);
        clearTimeout(bubbleTimeout);

        const seconds = Math.floor(elapsed);
        if (seconds > bestScore) {
          bestScore = seconds;
          bestEl.textContent = bestScore;
        }

        const level = DIFFICULTY_LEVELS.slice()
          .reverse()
          .find((l) => elapsed >= l.time);
        messageEl.innerHTML = `💀 Tu as survécu <strong>${seconds}s</strong> — ${level.label} — ${revealedIndices.size}/${fullFlag.length} lettres collectées`;
        restartBtn.style.display = "inline-block";
      }

      // =====================
      // DÉMARRAGE / RESTART
      // =====================
      function startGame() {
        fireballs = [];
        particles = [];
        collectParticles = [];
        flagBubbles = [];
        gameOver = false;
        startTime = Date.now();
        currentLevel = 0;
        fireballSpeed = DIFFICULTY_LEVELS[0].speed;
        spawnDelay = DIFFICULTY_LEVELS[0].interval;
        player = { x: 350, y: 300, radius: 18 };
        messageEl.textContent =
          "🖱️ Déplace ta souris pour esquiver et collecter les lettres !";
        restartBtn.style.display = "none";
        diffFill.style.width = "0%";

        scheduleNextFireball();
        scheduleBubble();
        // Première bulle après 3s
        setTimeout(() => {
          if (!gameOver) spawnFlagBubble();
        }, 3000);
        gameLoop();
      }

      function restartGame() {
        clearTimeout(spawnTimeout);
        clearTimeout(bubbleTimeout);
        cancelAnimationFrame(animId);
        // On garde les lettres déjà collectées !
        startGame();
      }

      // =====================
      // INIT
      // =====================
      fetchFlag().then(() => startGame());
    </script>
  </body>
</html>
